        const elDistance = document.getElementById('distance');
        const elPace = document.getElementById('pace');
        const elTime = document.getElementById('time');

        const templateGrid = document.getElementById('template-grid');

        let lastEdited = 'pace';
        let currentTemplateId = 0;

        elPace.addEventListener('input', () => { lastEdited = 'pace'; calculateStats(); });
        elTime.addEventListener('input', () => { lastEdited = 'time'; calculateStats(); });
        elDistance.addEventListener('input', () => { calculateStats(); });

        function parsePace(str) {
            const p = str.split(':');
            return p.length === 2 ? (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0) : 0;
        }

        function parseTime(str) {
            const p = str.split(':');
            if (p.length === 3) return (parseInt(p[0]) || 0) * 3600 + (parseInt(p[1]) || 0) * 60 + (parseInt(p[2]) || 0);
            if (p.length === 2) return (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0);
            return 0;
        }

        function formatDisplayTime(totalSeconds) {
            if (!totalSeconds || isNaN(totalSeconds)) return "0m 0s";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.round(totalSeconds % 60);

            if (h >= 1) return `${h}h ${m}m`;
            return `${m}m ${s}s`;
        }

        function formatPace(sec) {
            if (!sec || isNaN(sec) || !isFinite(sec)) return "00:00";
            const m = Math.floor(sec / 60);
            const s = Math.round(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatTimeInput(sec) {
            if (!sec || isNaN(sec)) return "00:00:00";
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = Math.round(sec % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function calculateStats() {
            const dist = parseFloat(elDistance.value) || 0;
            if (dist <= 0) { renderCard(); return; }

            if (lastEdited === 'pace') {
                const paceSec = parsePace(elPace.value);
                const totalSec = paceSec * dist;
                elTime.value = formatTimeInput(totalSec);
            } else if (lastEdited === 'time') {
                const timeSec = parseTime(elTime.value);
                const paceSec = timeSec / dist;
                elPace.value = formatPace(paceSec);
            }
            renderCard();
        }

                            <div><div style="font-family:'Oswald', sans-serif;" class="text-6xl font-bold text-white tracking-wide italic leading-tight">${d} KM</div></div>
                            <div class="flex gap-10">
                                <div><div class="text-[10px] text-slate-400 uppercase mb-1">Pace</div><div class="text-xl font-bold font-mono text-cyan-300 leading-tight">${p}</div></div>
                                <div><div class="text-[10px] text-slate-400 uppercase mb-1">Time</div><div class="text-xl font-bold font-mono text-white leading-tight">${t}</div></div>
                            </div>
                        </div>
                    </div>`
            },
            {
                name: "20",
                render: (d, p, t) => `
                    <div class="p-6 text-white text-center w-full box-border">
                        <div class="flex justify-center items-end mb-6 gap-2"><div class="text-7xl font-black font-mono tracking-tighter leading-tight">${d}</div><div class="text-xl text-zinc-500 font-sans mb-2">KM</div></div>
                        <div class="flex justify-center gap-10 text-sm font-mono border-t border-zinc-700/50 pt-4">
                            <div class="text-left flex flex-col items-start"><div class="text-[10px] text-zinc-400 uppercase mb-1">PACE</div><div class="text-white font-bold text-2xl leading-tight">${p}</div></div>
                            <div class="text-right flex flex-col items-end"><div class="text-[10px] text-zinc-400 uppercase mb-1">TIME</div><div class="text-white font-bold text-2xl leading-tight">${t}</div></div>
                        </div>
                    </div>`
            }
        ];

        function buildTemplateGrid() {
            templateGrid.innerHTML = '';
            templates.forEach((t, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `p-2 rounded-lg border text-center transition duration-200 flex items-center justify-center h-12 ${
                    index === currentTemplateId 
                    ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400 font-black shadow-lg shadow-emerald-500/10' 
                    : 'bg-slate-950 border-slate-800 text-slate-400 font-bold hover:border-slate-700 hover:text-slate-200'
                }`;
                btn.onclick = () => selectTemplate(index);
                btn.innerText = t.name;
                templateGrid.appendChild(btn);
            });
        }

        function selectTemplate(index) {
            currentTemplateId = index;
            buildTemplateGrid();
            renderCard();
        }

        function renderCard() {
            const dist = parseFloat(elDistance.value) || 0;
            const formattedDist = dist.toFixed(2);
            const paceStr = elPace.value || "00:00";
            const calculatedSecs = parseTime(elTime.value);
            const displayTimeStr = formatDisplayTime(calculatedSecs);

            captureCard.innerHTML = templates[currentTemplateId].render(formattedDist, paceStr, displayTimeStr);
        }

        function copyImage() {
            const btnSpan = document.querySelector('#btn-copy span');
            const originalText = btnSpan.innerText;
            btnSpan.innerText = 'Menyalin...';

            html2canvas(captureCard.firstElementChild, {
                backgroundColor: null,
                scale: 4, 
                logging: false,
                useCORS: true
            }).then(canvas => {
                canvas.toBlob(blob => {
                    if (!blob) {
                        alert("Gagal memproses gambar.");
                        btnSpan.innerText = originalText;
                        return;
                    }
                    try {
                        const item = new ClipboardItem({ 'image/png': blob });
                        navigator.clipboard.write([item]).then(() => {
                            btnSpan.innerText = 'Tersalin!';
                            setTimeout(() => { btnSpan.innerText = originalText; }, 2000);
                        }).catch(err => {
                            console.error(err);
                            alert("Izin Ditolak: Browser Anda mencegah penyalinan gambar langsung. Silakan gunakan tombol Download Image.");
                            btnSpan.innerText = originalText;
                        });
                    } catch (error) {
                        console.error(error);
                        alert("Browser Anda belum mendukung fitur penyalinan gambar (ClipboardItem). Silakan gunakan tombol Download Image.");
                        btnSpan.innerText = originalText;
                    }
                }, 'image/png');
            });
        }

        function downloadTransparentPNG() {
            html2canvas(captureCard.firstElementChild, {
                backgroundColor: null,
                scale: 4,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `RunStats_Transparent_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        buildTemplateGrid();
        calculateStats();
    </script>
</body>
</html>
